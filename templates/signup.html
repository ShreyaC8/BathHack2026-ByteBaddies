<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign Up - LifeMax</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #d4d4d8;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 300px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  h2 { text-align: center; margin-bottom: 20px; }

  input {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 5px;
    border: 1px solid #ccc;
  }

  button {
    width: 100%;
    padding: 10px;
    background: #e899c5;
    border: none;
    color: white;
    border-radius: 5px;
    cursor: pointer;
  }

  button:hover { background: #b77c9d; }

  .link {
    text-align: center;
    margin-top: 10px;
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="container">
  <h2>Sign Up</h2>

  <form id="signupForm">
    <input type="text" placeholder="Username" required>
    <input type="email" placeholder="Email" required>
    <input type="password" placeholder="Password" required>
    <button type="submit">Create Account</button>
  </form>

  <div class="link">
    Already have an account? <a href="login.html">Log In</a>
  </div>
</div>

<script>
document.getElementById("signupForm").addEventListener("submit", function(e){
  e.preventDefault();
  alert("Signup logic goes here");
});
</script>

</body>
</html>
