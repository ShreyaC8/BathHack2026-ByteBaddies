<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign Up - LifeMax</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #eee9ee;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  .container {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 300px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }
  h2 { text-align: center; margin-bottom: 20px; }
  input {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 5px;
    border: 1px solid #ccc;
  }
  button {
    width: 100%;
    padding: 10px;
    background: #e899c5;
    border: none;
    color: white;
    border-radius: 5px;
    cursor: pointer;
  }
  button:hover { background: #b77c9d; }
  .link {
    text-align: center;
    margin-top: 10px;
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="container">
  <h2>Sign Up</h2>
  <form id="signupForm" method="POST" action="Register.php">
    <input type="text" name="UserLogin" placeholder="Username" required>
    <input type="email" name="LoginEmail" placeholder="Email" required>
    <input type="password" name="LoginPass" placeholder="Password" required>
    <button type="submit">Create Account</button>
  </form>
  <div class="link">
    Already have an account? <a href="/login">Log In</a>
  </div>
</div>

<script>
document.getElementById("signupForm").addEventListener("submit", function(e) {
    e.preventDefault();
    const formData = new FormData(this);

    fetch("http://localhost:8080/Register.php", {
        method: "POST",
        body: formData
    })
    .then(response => response.text())
    .then(text => {
        console.log("PHP response:", text);
        window.location.href = "http://127.0.0.1:5000/quiz";
    })
    .catch(error => console.error("Error:", error));
});
</script>

</body>
</html>
