<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif; }
  body { display:flex; flex-direction:column; height:100vh; background:#d4d4d8; }
  header { height:120px; width: 100%; background:#d4d4d8; color:white; display:flex; align-items:center; justify-content: flex-start; padding:0 20px; position: relative;}
  /* left side (menu + logo) */
  .left-section {display: flex; align-items: center; gap: 10px;}
  .menu-icon { font-size:30px; color:#2e56a8; cursor:pointer; margin-right:15px; }
  .logo {height: 95px;width: auto;object-fit: contain;}

  /* center tagline */
  .tagline {position: absolute;left: 50%;transform: translateX(-50%);max-height: 25px;height: auto;}

  /* right login and sign up page buttons */
  .right-section {
    margin-left: auto; /* pushes it to the right */
    display: flex;
    gap: 10px;
    align-items: center;
  }
  /* Base button style */
  .right-section button {
    padding: 8px 14px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s ease;
  }
  /* Log in button (subtle) */
  .login-btn {
    background: transparent;
    color: #2e56a8;
    border: 1px solid #2e56a8;
  }
  .login-btn:hover {
    background: #2e56a8;
    color: white;
  }
  /* Sign up button (primary) */
  .signup-btn {
    background: #2e56a8;
    color: white;
  }
  .signup-btn:hover {
    background: #2b4477;
  }
  .like-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }

  .like-btn:hover {
      background: rgba(255, 100, 100, 0.1);
  }

  .like-btn svg {
      width: 32px;
      height: 32px;
      fill: none;
      stroke: lightcoral;
      stroke-width: 2;
      transition: fill 0.2s, transform 0.2s;
  }

  .like-btn:hover svg {
      fill: lightcoral;
      transform: scale(1.15);
  }

  .like-btn.liked svg {
      fill: lightcoral;
      stroke: lightcoral;
  }
  .like-btn:active svg {
    transform: scale(0.95);
  }
  .complete-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }

  .complete-btn:hover {
    background: rgb(41, 154, 63);
  }

  .complete-btn svg {
    width: 40px;
    height: 40px;
    fill: transparent;          /* invisible by default */
    stroke: rgb(41, 154, 63);            /* outline */
    stroke-width: 1.3;
    transition: all 0.2s ease;
  }

  /* hover = filled */

  .complete-btn:hover svg {
    fill: rgb(41, 154, 63);
    stroke: rgb(41, 154, 63);
    transform: scale(1.15);
  }

  /* clicked (persistent state) */
  .complete-btn.completed svg {
    fill: rgb(41, 154, 63);
    stroke: rgb(41, 154, 63);
  }

  .complete-btn:active svg {
    transform: scale(0.95);
  }


  

  
  header h1 { font-size:20px; }
  .layout { display:flex; flex:1; overflow:hidden; }
  .sidebar { width:220px; background:#d4d4d8; color:white; padding:20px 10px; display:flex; flex-direction:column; transition:width 0.3s ease; flex-shrink:0; }
  .sidebar.closed { width:0; padding:20px 0; overflow:hidden; }
  .sidebar button { display:flex; align-items:center; width:100%; margin-bottom:10px; padding:10px; border:none; background:#2e56a8; color:white; cursor:pointer; text-align:left; }

  .card-container { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:15px; }
  .card { background:white; padding:15px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
  .card h3 { margin-bottom:10px; }

  .card button { padding:6px 10px; border:none; background:white;  cursor:pointer; border-radius:4px; }

<script>
const sidebar = document.getElementById('sidebar');
function toggleSidebar(){ sidebar.classList.toggle('closed'); }

// filter buttons logic
const filters = document.querySelectorAll('.filter-btn');
const cardContainer = document.getElementById('cardContainer');

filters.forEach(btn => {
  btn.addEventListener('click', () => {
    const filter = btn.dataset.filter;

    if(filter==='all'){
      filters.forEach(f=>f.classList.remove('active'));
      btn.classList.add('active');
    } else {
      btn.classList.toggle('active');
      document.querySelector('.filter-btn[data-filter="all"]').classList.remove('active');
      const anyActive = [...filters].some(f=>f.dataset.filter!=='all'&&f.classList.contains('active'));
      if(!anyActive) document.querySelector('.filter-btn[data-filter="all"]').classList.add('active');
    }
    updateCards();
  });
});

function updateCards(){
  const activeFilters = [...filters].filter(f=>f.classList.contains('active') && f.dataset.filter!=='all').map(f=>f.dataset.filter);
  const cards = document.querySelectorAll('.card');
  cards.forEach(card => {
    const categories = card.dataset.category.split(','); // multiple categories support
    if(activeFilters.length===0 || categories.some(c=>activeFilters.includes(c))) card.style.display='block';
    else card.style.display='none';
  });
}

// card generator
function addCardFromBackend(data) {
  const template = document.getElementById('card-template');
  
  // coppy the template
  const clone = template.content.cloneNode(true);

  // find the parts of the clone and fill them with the data
  const cardDiv = clone.querySelector('.card');
  const title = clone.querySelector('.card-title');
  const saveBtn = clone.querySelector('.save-btn');

  // set the category 
  cardDiv.dataset.category = data.categories.join(',');
  
  // set the text
  title.textContent = data.title;


  const likeBtn = clone.querySelector(".like-btn");

  likeBtn.addEventListener("click", () => {
      likeBtn.classList.toggle("liked");
  });

  const completeBtn = clone.querySelector(".complete-btn");

  completeBtn.addEventListener("click", () => {
    completeBtn.classList.toggle("completed");
  });

  cardContainer.appendChild(clone);
  
  updateCards(); 
}



backendData.forEach(d => addCardFromBackend(d));

mainContent.addEventListener('scroll', () => {
  if(mainContent.scrollTop + mainContent.clientHeight >= mainContent.scrollHeight - 10){
    // call backend API and pass data to addCardFromBackend
    addCardFromBackend({title:"Learn a New Skill", categories:["learning"]});
